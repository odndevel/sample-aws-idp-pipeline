[package]
name = "toka"
version = "0.1.0"
edition = "2024"

[dependencies]
lindera = { version = "2.3.2", features = ["embed-cjk", "compress"]}
icu_segmenter = "2.1.2"
lambda_runtime = "0.13"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
